<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>מערכת תקציב</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background:red;
    font-family:Arial;
}

.card{
    border:none;
    border-radius:16px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    margin-bottom:12px;
}

.month-card{
    background:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    border:2px solid transparent;
    min-width:120px;
}

.active-month{
    border-color:#357bd8;
    background:#eef5ff;
}

.summary-number{
    font-size:22px;
    font-weight:bold;
    color:#357bd8;
}

.tag{
    background:#e8eefc;
    padding:5px 10px;
    border-radius:12px;
    display:inline-flex;
    gap:5px;
    margin:3px;
}

.category-box{
    background:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container mt-4">

<!-- חודשים -->
<div class="card p-3">
  <div class="d-flex justify-content-between mb-2">
    <h5>📅 חודשים</h5>
    <button class="btn btn-primary btn-sm" onclick="createMonth()">+ חודש</button>
  </div>
  <div id="monthsContainer" class="d-flex gap-2 flex-wrap"></div>
</div>

<!-- נטו -->
<div class="card p-3 text-center">
  <div>💰 נטו</div>
  <div class="summary-number" id="netIncome">0 ₪</div>
</div>

<!-- חיסכון -->
<div class="card p-3 text-center">
  <div>💸 חיסכון</div>
  <div class="summary-number" id="saving">0 ₪</div>
</div>

<!-- נטו -->
<div class="card p-3">
  <input id="incomeInput" class="form-control mb-2" type="number" placeholder="נטו חודשי">
  <button class="btn btn-primary w-100" onclick="saveIncome()">שמירה</button>
</div>

<!-- קטגוריות -->
<div class="card p-3">
  <input id="catInput" class="form-control mb-2" placeholder="קטגוריה">
  <button class="btn btn-dark w-100" onclick="addCategory()">הוסף קטגוריה</button>
  <div id="catList" class="mt-2"></div>
</div>

<!-- הוצאות -->
<div class="card p-3">
  <input id="expName" class="form-control mb-2" placeholder="שם הוצאה">
  <input id="expAmount" class="form-control mb-2" type="number" placeholder="סכום">
  <select id="expCategory" class="form-control mb-2"></select>
  <button class="btn btn-success w-100" onclick="addExpense()">הוספה</button>
</div>

<div id="groupedView"></div>

</div>

<script>

let months = JSON.parse(localStorage.getItem("months")) || {};
let currentMonth = localStorage.getItem("currentMonth");
let editId = null;

/* INIT */
function init(){
    if(!currentMonth || !months[currentMonth]){
        const d = new Date();
        currentMonth = `${d.getMonth()+1}-${d.getFullYear()}`;

        months[currentMonth] = {
            income:0,
            categories:[],
            expenses:[]
        };
    }
}
init();

/* SAVE */
function save(){
    localStorage.setItem("months", JSON.stringify(months));
    localStorage.setItem("currentMonth", currentMonth);
}

/* GET */
function get(){
    return months[currentMonth];
}

/* MONTHS */
function createMonth(){
    const name = prompt("חודש (MM-YYYY)");
    if(!name) return;

    const last = getLastCategories();

    months[name] = {
        income:0,
        categories:[...last],
        expenses:[]
    };

    currentMonth = name;
    save();
    renderAll();
}

function getLastCategories(){
    const keys = Object.keys(months);
    if(!keys.length) return [];

    return months[keys[keys.length-1]].categories || [];
}

function switchMonth(m){
    currentMonth = m;
    save();
    renderAll();
}

/* INCOME */
function saveIncome(){
    get().income = Number(incomeInput.value) || 0;
    incomeInput.value = "";
    save();
    renderAll();
}

/* CATEGORY */
function addCategory(){
    const val = catInput.value.trim();
    if(!val) return;

    const m = get();
    if(!m.categories.includes(val)){
        m.categories.push(val);
    }

    catInput.value = "";
    save();
    renderAll();
}

/* EXPENSE */
function addExpense(){
    const m = get();

    const name = expName.value;
    const amount = Number(expAmount.value);
    const cat = expCategory.value;

    if(!name || !amount || !cat) return;

    m.expenses.push({
        id:Date.now(),
        name,
        amount,
        category:cat
    });

    expName.value="";
    expAmount.value="";

    save();
    renderAll();
}

/* RENDER */
function renderAll(){
    renderMonths();
    renderCategories();
    renderExpenses();
    renderSummary();
}

function renderMonths(){
    monthsContainer.innerHTML = "";

    Object.keys(months).forEach(m=>{
        monthsContainer.innerHTML += `
        <div class="month-card ${m===currentMonth?'active-month':''}"
        onclick="switchMonth('${m}')">
        📅 ${m}
        </div>`;
    });
}

function renderCategories(){
    const m = get();

    catList.innerHTML = "";
    expCategory.innerHTML = "";

    if(!m) return;

    m.categories.forEach(c=>{
        catList.innerHTML += `<div class="tag">${c}</div>`;
        expCategory.innerHTML += `<option>${c}</option>`;
    });
}

function renderExpenses(){
    const m = get();
    groupedView.innerHTML = "";

    if(!m) return;

    m.categories.forEach(cat=>{
        const items = m.expenses.filter(e=>e.category===cat);
        if(!items.length) return;

        const sum = items.reduce((a,b)=>a+b.amount,0);

        let html = `<div class="category-box">
        <b>${cat}</b> — ${sum} ₪<br>`;

        items.forEach(e=>{
            html += `${e.name} - ${e.amount} ₪<br>`;
        });

        html += `</div>`;
        groupedView.innerHTML += html;
    });
}

/* SUMMARY */
function renderSummary(){
    const m = get();
    if(!m) return;

    const total = m.expenses.reduce((s,e)=>s+e.amount,0);

    netIncome.innerText = m.income + " ₪";
    saving.innerText = (m.income - total) + " ₪";
}

/* START */
renderAll();

</script>

</body>
</html>
