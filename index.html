<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>מערכת תקציב חכמה</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  projectId: "..."
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body{background:#f4f6fb;font-family:Arial}
.card{border:none;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,0.08);margin-bottom:15px}
.month-card{background:white;padding:10px;border-radius:12px;min-width:120px;cursor:pointer;border:2px solid transparent}
.active-month{border-color:#357bd8;background:#eef5ff}
.summary-number{font-size:22px;font-weight:bold;color:#357bd8}
.tag{background:#e8eefc;padding:5px 10px;border-radius:12px;display:inline-flex;gap:5px;margin:3px}
.category-box{background:white;padding:12px;border-radius:14px;margin-bottom:10px}
.category-header{display:flex;justify-content:space-between;font-weight:bold}
.expense-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}
</style>

</head>

<body>

<div class="container mt-4">

<!-- חודשים -->
<div class="card p-3">
  <div class="d-flex justify-content-between mb-2">
    <h5>📅 חודשים</h5>
    <button class="btn btn-primary btn-sm" onclick="createMonth()">+ חודש</button>
  </div>
  <div id="monthsContainer" class="d-flex gap-2 flex-wrap"></div>
</div>

<!-- נטו וחיסכון -->
<div class="card p-3 text-center">
  <div>💰 נטו</div>
  <div class="summary-number" id="netIncome">0 ₪</div>
</div>

<div class="card p-3 text-center">
  <div>💸 חיסכון</div>
  <div class="summary-number" id="saving">0 ₪</div>
</div>

<!-- נטו -->
<div class="card p-3">
  <input id="incomeInput" class="form-control mb-2" type="number" placeholder="נטו חודשי">
  <button class="btn btn-primary w-100" onclick="saveIncome()">שמירה</button>
</div>

<!-- קטגוריות -->
<div class="card p-3">
  <input id="catInput" class="form-control mb-2" placeholder="קטגוריה">
  <button class="btn btn-dark w-100" onclick="addCategory()">הוספת קטגוריה</button>
  <div id="catList" class="mt-2"></div>
</div>

<!-- הוצאה -->
<div class="card p-3">
  <input id="expName" class="form-control mb-2" placeholder="שם הוצאה">
  <input id="expAmount" class="form-control mb-2" type="number" placeholder="סכום">
  <select id="expCategory" class="form-control mb-2"></select>
  <button class="btn btn-success w-100" onclick="addExpense()">הוספה</button>
</div>

<div id="groupedView"></div>

</div>

<script>

let months = {};
let currentMonth = null;
let editId = null;

/* ================= LOAD ================= */
async function loadData() {
  const snap = await db.collection("months").get();

  months = {};
  snap.forEach(doc => months[doc.id] = doc.data());

  if (!currentMonth || !months[currentMonth]) {
    currentMonth = Object.keys(months)[0] || null;
  }

  if (!currentMonth) {
    const d = new Date();
    currentMonth = `${d.getMonth()+1}-${d.getFullYear()}`;

    months[currentMonth] = {
      income:0,
      categories:[],
      expenses:[]
    };

    await saveToFirebase();
  }

  renderAll();
}

/* ================= SAVE ================= */
async function saveToFirebase() {
  if (!currentMonth) return;

  await db.collection("months")
    .doc(currentMonth)
    .set(months[currentMonth], { merge:true });
}

/* ================= MONTH ================= */
async function createMonth() {
  const name = prompt("חודש (MM-YYYY)");
  if (!name) return;

  const last = Object.values(months)[0]?.categories || [];

  months[name] = {
    income:0,
    categories:[...last],
    expenses:[]
  };

  currentMonth = name;

  await saveToFirebase();
  renderAll();
}

function switchMonth(m) {
  currentMonth = m;
  renderAll();
}

/* ================= INCOME ================= */
async function saveIncome() {
  months[currentMonth].income =
    Number(document.getElementById("incomeInput").value) || 0;

  await saveToFirebase();
  renderAll();
}

/* ================= CATEGORY ================= */
async function addCategory() {
  const val = catInput.value.trim();
  if (!val) return;

  if (!months[currentMonth].categories.includes(val)) {
    months[currentMonth].categories.push(val);
  }

  catInput.value = "";

  await saveToFirebase();
  renderAll();
}

/* ================= EXPENSE ================= */
async function addExpense() {
  const m = months[currentMonth];

  const name = expName.value;
  const amount = Number(expAmount.value);
  const cat = expCategory.value;

  if (!name || !amount || !cat) return;

  m.expenses.push({
    id:Date.now(),
    name,
    amount,
    category:cat
  });

  expName.value = "";
  expAmount.value = "";

  await saveToFirebase();
  renderAll();
}

/* ================= RENDER ================= */
function renderAll() {
  renderMonths();
  renderCategories();
  renderExpenses();
  renderSummary();
}

function renderMonths() {
  monthsContainer.innerHTML = "";

  Object.keys(months).forEach(m => {
    monthsContainer.innerHTML += `
      <div class="month-card ${m===currentMonth?'active-month':''}"
      onclick="switchMonth('${m}')">
      📅 ${m}
      </div>`;
  });
}

function renderCategories() {
  const m = months[currentMonth];

  catList.innerHTML = "";
  expCategory.innerHTML = "";

  if (!m) return;

  m.categories.forEach(c=>{
    catList.innerHTML += `<div class="tag">${c}</div>`;
    expCategory.innerHTML += `<option>${c}</option>`;
  });
}

function renderExpenses() {
  const m = months[currentMonth];
  groupedView.innerHTML = "";

  if (!m) return;

  m.categories.forEach(cat=>{
    const items = m.expenses.filter(e=>e.category===cat);

    if (!items.length) return;

    const sum = items.reduce((a,b)=>a+b.amount,0);

    let html = `
    <div class="category-box">
      <div class="category-header">
        <span>${cat}</span>
        <span>${sum} ₪</span>
      </div>`;

    items.forEach(e=>{
      html += `<div class="expense-row">
        ${e.name} - ${e.amount} ₪
      </div>`;
    });

    html += `</div>`;
    groupedView.innerHTML += html;
  });
}

function renderSummary() {
  const m = months[currentMonth];
  if (!m) return;

  const total = m.expenses.reduce((s,e)=>s+e.amount,0);
  const saving = m.income - total;

  netIncome.innerText = m.income + " ₪";
  saving.innerText = saving + " ₪";
}

/* ================= START ================= */
loadData();

</script>

</body>
</html>
